services:
  postgres:
    image: postgres:16
    container_name: keypilot-postgres
    environment:
      POSTGRES_DB: keypilot
      POSTGRES_USER: keypilot
      POSTGRES_PASSWORD: keypilot
    ports:
      - "5433:5432"
    volumes:
      - keypilot-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: keypilot-temporal
    ports:
      - "7233:7233"
      - "8233:8233"

volumes:
  keypilot-postgres-data:
